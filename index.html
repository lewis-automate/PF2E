<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PF2E Relic Sheet</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-left tabs" aria-label="Main tabs">
        <button class="tab-btn active" data-tab="overview" type="button">Overview</button>
        <button class="tab-btn" data-tab="base" type="button">Stats</button>
      </div>
      <h1 id="character-header-name">Character</h1>
      <div class="top-actions">
        <button id="overview-edit-btn" type="button">Edit Layout</button>
        <div class="manage-menu-wrap">
          <button id="manage-characters-btn" type="button" aria-expanded="false" aria-controls="manage-characters-popup">
            Manage Characters
          </button>
          <div id="manage-characters-popup" class="manage-menu-popup" aria-hidden="true">
            <button id="manage-characters-open-btn" type="button">Characters</button>
            <button id="manage-import-btn" type="button">Import</button>
            <button id="manage-export-btn" type="button">Export</button>
          </div>
        </div>
      </div>
    </header>

    <main id="app-root">
      <section class="tab-panel active" id="tab-overview">
        <div id="overview-workspace"></div>
      </section>

      <section class="tab-panel" id="tab-base">
        <div class="card">
          <h2>Stats</h2>
          <div id="base-panel"></div>
        </div>
      </section>

    </main>

    <div class="floating-actions">
      <button id="quick-roll-toggle" class="roll-log-toggle" type="button">Roll</button>
      <button id="roll-log-toggle" class="roll-log-toggle" type="button">Log</button>
    </div>
    <aside id="quick-roll-popup" class="roll-log-popup quick-roll-popup" aria-hidden="true">
      <div class="roll-log-head">
        <h2>Quick Roll</h2>
        <button id="quick-roll-close" type="button">Close</button>
      </div>
      <div class="row">
        <button id="quick-roll-d20-btn" type="button">Roll d20</button>
      </div>
      <div class="row">
        <label><input id="quick-roll-count" type="number" min="1" step="1" value="1" /></label>
        <span>d</span>
        <label><input id="quick-roll-sides" type="number" min="2" step="1" value="6" /></label>
        <button id="quick-roll-apply-btn" type="button">Roll</button>
      </div>
    </aside>
    <aside id="roll-log-popup" class="roll-log-popup" aria-hidden="true">
      <div class="roll-log-head">
        <h2>Log</h2>
        <button id="roll-log-close" type="button">Close</button>
      </div>
      <div id="roll-log"></div>
    </aside>
    <aside id="characters-popup" class="roll-log-popup characters-popup" aria-hidden="true">
      <div class="roll-log-head">
        <h2>Characters</h2>
        <div class="row">
          <button id="characters-new-btn" type="button">New Character</button>
          <button id="characters-save-as-btn" type="button">Save As</button>
          <button id="characters-close" type="button">Close</button>
        </div>
      </div>
      <div id="characters-list"></div>
    </aside>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
